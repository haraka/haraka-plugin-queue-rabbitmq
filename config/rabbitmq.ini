
[main]
; module= amqp || amqplib
module=amqp

[rabbitmq]
exchangeName  = emailMessages
server_ip = localhost
server_port = 5672
queueName = email
deliveryMode = 2
confirm = true
durable = true
autoDelete = false
exchangeType = direct


[amqplib]
host = localhost
port = 5672
user = guest
password = guest
exchangeName  = email_messages
exchangeType = direct
queueName = emails
deliveryMode = 2
confirm = true
durable = true
autoDelete = false

[exchange_args]


; Optional queue arguments
[amqplib_args]
; x-dead-letter-exchange =
; x-dead-letter-routing-key = emails_dlq
; x-overflow = reject-publish
; x-queue-type = quorum